name: CI

on:
  push:
    branches: [ master]
  pull_request:
    branches: [ master]

jobs:
  lint-type-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install dependencies
      run: make dev-install
    - name: Lint and type check
      run: make lint type-check
    - name: Security audit
      run: make sast
    - name: Dependency audit
      run: make audit

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
    - name: Install dependencies
      run: make dev-install
    - name: Run tests with coverage
      run: uv run pytest --cov=pp.server --cov-report=term-missing --cov-fail-under=95

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Build distribution
      run: make build
    - name: Verify wheel installs
      run: |
        uv venv /tmp/clean-venv
        uv pip install --python /tmp/clean-venv/bin/python dist/*.whl
        /tmp/clean-venv/bin/pp-server --help
