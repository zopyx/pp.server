repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - "pydantic>=2.0"
          - "fastapi>=0.115"
          - "loguru>=0.7"
          - "types-python-dateutil"
        args: [--ignore-missing-imports, --explicit-package-bases, pp/server]
        files: ^pp/server/
        exclude: ^pp/server/tests/
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        files: ^pp/server/
